services:
  postgres:
    image: postgres:16-alpine
    container_name: crono-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: crono
    ports:
      - "5433:5432"
    volumes:
      - crono_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: crono-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  crono_pg_data: